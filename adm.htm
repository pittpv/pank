<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="joke-banner.js" defer></script>
    <title>Админ-панель - PWA Сбер</title>
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #21a038 0%, #00d920 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 760px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #21a038;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .admin-section {
            margin: 36px 0 28px;
            padding-top: 28px;
            border-top: 2px solid #eeeeee;
        }

        .admin-section h2 {
            margin-bottom: 8px;
            color: #222;
            font-size: 22px;
        }

        .section-hint {
            margin-bottom: 22px;
            color: #666;
            font-size: 14px;
            line-height: 1.45;
        }

        .account-editor {
            margin-top: 18px;
            padding: 20px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
        }

        .account-editor legend {
            padding: 0 8px;
            color: #21a038;
            font-size: 16px;
            font-weight: 700;
        }

        .account-fields {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(120px, 1fr);
            gap: 16px;
        }

        .account-fields .form-group {
            margin-bottom: 0;
        }

        @media (max-width: 620px) {
            .admin-container {
                padding: 28px 20px;
            }

            .account-fields {
                grid-template-columns: 1fr;
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #21a038;
        }

        .balance-preview {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .preview-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .preview-value {
            font-size: 24px;
            font-weight: bold;
            color: #21a038;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: #21a038;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #1a8f2f;
            transform: translateY(-2px);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #21a038;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>⚙️ Админ-панель</h1>
        <p class="subtitle">Управление значениями на экранах приложения</p>

        <form id="adminForm">
            <div class="form-group">
                <label for="walletBalance">Баланс кошелька (₽)</label>
                <input type="text" id="walletBalance" inputmode="decimal" placeholder="Например: 1 964,77" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="walletPreview">1 964,77 ₽</div>
                </div>
            </div>

            <div class="form-group">
                <label for="sberbonusBalance">Бонусы СберСпасибо</label>
                <input type="text" id="sberbonusBalance" inputmode="numeric" placeholder="Например: 111" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="sberbonusPreview">111</div>
                </div>
            </div>

            <section class="admin-section" aria-labelledby="savingsSettingsTitle">
                <h2 id="savingsSettingsTitle">Накопления</h2>
                <p class="section-hint">Настройки экрана «Накопления». Все суммы форматируются автоматически.</p>

                <div class="form-group">
                    <label for="savingsTotal">Всего средств (₽)</label>
                    <input type="text" id="savingsTotal" inputmode="decimal" placeholder="Например: 180 500,22" required>
                    <div class="balance-preview">
                        <div class="preview-label">Предпросмотр:</div>
                        <div class="preview-value" id="savingsTotalPreview">180 500,22 ₽</div>
                    </div>
                </div>

                <div id="accountsEditor"></div>
            </section>

            <button type="submit" class="btn-save">💾 Сохранить изменения</button>
            <button type="button" class="btn-reset" id="btnReset">🔄 Сбросить к исходным</button>

            <div class="success-message" id="successMessage">
                ✅ Изменения успешно сохранены! Обновите главную страницу.
            </div>
        </form>

        <a href="Main.htm" class="nav-link">← Вернуться в приложение</a>
    </div>

    <script>
        // API endpoint для сервера
        const API_URL = '/api/balances';

        // Ключи для localStorage (резервное хранение)
        const WALLET_KEY = 'pwa_wallet_balance';
        const SBERBONUS_KEY = 'pwa_sberbonus_balance';
        const SAVINGS_TOTAL_KEY = 'pwa_savings_total';
        const SAVINGS_ACCOUNTS_KEY = 'pwa_savings_accounts';

        // Исходные значения
        const DEFAULT_WALLET = '1 964,77';
        const DEFAULT_SBERBONUS = '111';
        const DEFAULT_SAVINGS_TOTAL = '16 964,99';
        const DEFAULT_SAVINGS_ACCOUNTS = [
            { name: 'Сберегательный счет', number: '2838', amount: '15 000,22', rate: '0,01' },
            { name: 'Вклад «Лучший %»', number: '4812', amount: '120 000,00', rate: '14,5' },
            { name: 'Накопительный счет', number: '9074', amount: '45 500,00', rate: '12' }
        ];

        // Элементы формы
        const walletInput = document.getElementById('walletBalance');
        const sberbonusInput = document.getElementById('sberbonusBalance');
        const walletPreview = document.getElementById('walletPreview');
        const sberbonusPreview = document.getElementById('sberbonusPreview');
        const adminForm = document.getElementById('adminForm');
        const successMessage = document.getElementById('successMessage');
        const btnReset = document.getElementById('btnReset');
        const savingsTotalInput = document.getElementById('savingsTotal');
        const savingsTotalPreview = document.getElementById('savingsTotalPreview');
        const accountsEditor = document.getElementById('accountsEditor');

        // Форматирование сумм с пробелами между разрядами
        function formatAmount(value, allowDecimals) {
            const normalized = String(value ?? '')
                .replace(/\s/g, '')
                .replace(/\./g, ',')
                .replace(allowDecimals ? /[^\d,]/g : /\D/g, '');
            const commaIndex = allowDecimals ? normalized.indexOf(',') : -1;
            const hasComma = commaIndex !== -1;
            let integerPart = hasComma ? normalized.slice(0, commaIndex) : normalized;
            const decimalPart = hasComma
                ? normalized.slice(commaIndex + 1).replace(/\D/g, '').slice(0, 2)
                : '';

            integerPart = integerPart.replace(/\D/g, '').replace(/^0+(?=\d)/, '');
            if (!integerPart && hasComma) integerPart = '0';

            const grouped = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return grouped + (hasComma ? ',' + decimalPart : '');
        }

        function formatInput(input, allowDecimals) {
            const caret = input.selectionStart ?? input.value.length;
            const valueBeforeCaret = input.value.slice(0, caret);
            const digitsBeforeCaret = valueBeforeCaret.replace(/\D/g, '').length;
            const caretIsAfterComma = allowDecimals && /[,.]/.test(valueBeforeCaret);
            const formatted = formatAmount(input.value, allowDecimals);

            input.value = formatted;

            let nextCaret = 0;
            let digitsSeen = 0;
            while (nextCaret < formatted.length && digitsSeen < digitsBeforeCaret) {
                if (/\d/.test(formatted[nextCaret])) digitsSeen += 1;
                nextCaret += 1;
            }
            if (caretIsAfterComma && formatted.includes(',')) {
                nextCaret = Math.max(nextCaret, formatted.indexOf(',') + 1);
            }
            input.setSelectionRange(nextCaret, nextCaret);
            return formatted;
        }

        function formatRate(value) {
            const normalized = String(value ?? '')
                .replace(/\./g, ',')
                .replace(/[^\d,]/g, '');
            const commaIndex = normalized.indexOf(',');
            if (commaIndex === -1) return normalized.slice(0, 3);
            const integerPart = normalized.slice(0, commaIndex).slice(0, 3);
            const decimalPart = normalized.slice(commaIndex + 1).replace(/\D/g, '').slice(0, 2);
            return integerPart + ',' + decimalPart;
        }

        function createAccountEditors() {
            DEFAULT_SAVINGS_ACCOUNTS.forEach((account, index) => {
                const number = index + 1;
                const fieldset = document.createElement('fieldset');
                fieldset.className = 'account-editor';
                fieldset.innerHTML = `
                    <legend>Вклад или счёт ${number}</legend>
                    <div class="account-fields">
                        <div class="form-group">
                            <label for="accountName${number}">Название</label>
                            <input type="text" id="accountName${number}" required>
                        </div>
                        <div class="form-group">
                            <label for="accountNumber${number}">Номер</label>
                            <input type="text" id="accountNumber${number}" inputmode="numeric" required>
                        </div>
                        <div class="form-group">
                            <label for="accountAmount${number}">Сумма (₽)</label>
                            <input type="text" id="accountAmount${number}" inputmode="decimal" data-account-amount required>
                        </div>
                        <div class="form-group">
                            <label for="accountRate${number}">Ставка (%)</label>
                            <input type="text" id="accountRate${number}" inputmode="decimal" data-account-rate required>
                        </div>
                    </div>
                `;
                accountsEditor.appendChild(fieldset);
            });
        }

        function readSavingsAccounts() {
            try {
                const saved = JSON.parse(localStorage.getItem(SAVINGS_ACCOUNTS_KEY));
                if (Array.isArray(saved) && saved.length === 3) return saved;
            } catch (e) {
                console.log('Не удалось прочитать настройки счетов', e);
            }
            return DEFAULT_SAVINGS_ACCOUNTS;
        }

        function getAccountFields(index) {
            const number = index + 1;
            return {
                name: document.getElementById(`accountName${number}`),
                number: document.getElementById(`accountNumber${number}`),
                amount: document.getElementById(`accountAmount${number}`),
                rate: document.getElementById(`accountRate${number}`)
            };
        }

        function loadSavingsFields() {
            const total = formatAmount(localStorage.getItem(SAVINGS_TOTAL_KEY) || DEFAULT_SAVINGS_TOTAL, true);
            const accounts = readSavingsAccounts();

            savingsTotalInput.value = total;
            savingsTotalPreview.textContent = total + ' ₽';

            accounts.forEach((account, index) => {
                const fields = getAccountFields(index);
                fields.name.value = account.name;
                fields.number.value = account.number;
                fields.amount.value = formatAmount(account.amount, true);
                fields.rate.value = formatRate(account.rate);
            });
        }

        function collectSavingsAccounts() {
            return DEFAULT_SAVINGS_ACCOUNTS.map((unused, index) => {
                const fields = getAccountFields(index);
                return {
                    name: fields.name.value.trim(),
                    number: fields.number.value.trim(),
                    amount: formatAmount(fields.amount.value, true),
                    rate: formatRate(fields.rate.value)
                };
            });
        }

        function saveSavingsFields() {
            const total = formatAmount(savingsTotalInput.value, true);
            const accounts = collectSavingsAccounts();
            localStorage.setItem(SAVINGS_TOTAL_KEY, total);
            localStorage.setItem(SAVINGS_ACCOUNTS_KEY, JSON.stringify(accounts));
            window.dispatchEvent(new Event('savings-config-updated'));
            return { total, accounts };
        }

        // Загрузка текущих значений с сервера
        async function loadValues() {
            try {
                const response = await fetch(API_URL, { method: 'GET' });
                if (response.ok) {
                    const data = await response.json();
                    const wallet = formatAmount(data.wallet || DEFAULT_WALLET, true);
                    const sberbonus = formatAmount(data.sberbonus || DEFAULT_SBERBONUS, false);
                    walletInput.value = wallet;
                    sberbonusInput.value = sberbonus;
                    updatePreviews(wallet, sberbonus);
                    return;
                }
            } catch (e) {
                console.log('Ошибка загрузки с сервера, используем localStorage', e);
            }

            // Fallback на localStorage если сервер недоступен
            const wallet = formatAmount(localStorage.getItem(WALLET_KEY) || DEFAULT_WALLET, true);
            const sberbonus = formatAmount(localStorage.getItem(SBERBONUS_KEY) || DEFAULT_SBERBONUS, false);
            walletInput.value = wallet;
            sberbonusInput.value = sberbonus;
            updatePreviews(wallet, sberbonus);
        }

        // Обновление предпросмотра
        function updatePreviews(wallet, sberbonus) {
            walletPreview.textContent = wallet + ' ₽';
            sberbonusPreview.textContent = sberbonus;
        }

        // Сохранение значений на сервере
        async function saveValues(wallet, sberbonus) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet, sberbonus })
                });

                if (response.ok) {
                    // Сохраняем также в localStorage для резерва
                    localStorage.setItem(WALLET_KEY, wallet);
                    localStorage.setItem(SBERBONUS_KEY, sberbonus);
                    // Отправляем событие для обновления на других вкладках
                    window.dispatchEvent(new Event('storage'));
                    return true;
                }
            } catch (e) {
                console.log('Ошибка сохранения на сервере, используем localStorage', e);
            }

            // Fallback на localStorage если сервер недоступен
            localStorage.setItem(WALLET_KEY, wallet);
            localStorage.setItem(SBERBONUS_KEY, sberbonus);
            window.dispatchEvent(new Event('storage'));
            return true;
        }

        // Обработчик отправки формы
        adminForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const wallet = formatAmount(walletInput.value, true);
            const sberbonus = formatAmount(sberbonusInput.value, false);
            const savingsTotal = formatAmount(savingsTotalInput.value, true);
            const savingsAccounts = collectSavingsAccounts();

            if (!wallet || !sberbonus || !savingsTotal ||
                savingsAccounts.some(account =>
                    !account.name || !account.number || !account.amount || !account.rate
                )) {
                alert('Пожалуйста, заполните все поля');
                return;
            }

            await saveValues(wallet, sberbonus);
            saveSavingsFields();
            updatePreviews(wallet, sberbonus);

            // Показываем сообщение об успехе
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        });

        // Обработчик сброса
        btnReset.addEventListener('click', async function() {
            if (confirm('Вы уверены, что хотите сбросить значения к исходным?')) {
                await saveValues(DEFAULT_WALLET, DEFAULT_SBERBONUS);
                localStorage.setItem(SAVINGS_TOTAL_KEY, DEFAULT_SAVINGS_TOTAL);
                localStorage.setItem(SAVINGS_ACCOUNTS_KEY, JSON.stringify(DEFAULT_SAVINGS_ACCOUNTS));
                loadValues();
                loadSavingsFields();
                window.dispatchEvent(new Event('savings-config-updated'));
                successMessage.textContent = '🔄 Значения сброшены к исходным!';
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                    successMessage.textContent = '✅ Изменения успешно сохранены! Обновите главную страницу.';
                }, 3000);
            }
        });

        // Обновление предпросмотра в реальном времени
        walletInput.addEventListener('input', function() {
            const value = formatInput(this, true) || DEFAULT_WALLET;
            walletPreview.textContent = value + ' ₽';
        });

        sberbonusInput.addEventListener('input', function() {
            const value = formatInput(this, false) || DEFAULT_SBERBONUS;
            sberbonusPreview.textContent = value;
        });

        savingsTotalInput.addEventListener('input', function() {
            const value = formatInput(this, true) || DEFAULT_SAVINGS_TOTAL;
            savingsTotalPreview.textContent = value + ' ₽';
        });

        accountsEditor.addEventListener('input', function(event) {
            if (event.target.matches('[data-account-amount]')) {
                formatInput(event.target, true);
            }
            if (event.target.matches('[data-account-rate]')) {
                const caret = event.target.selectionStart ?? event.target.value.length;
                event.target.value = formatRate(event.target.value);
                event.target.setSelectionRange(
                    Math.min(caret, event.target.value.length),
                    Math.min(caret, event.target.value.length)
                );
            }
            if (event.target.id.startsWith('accountNumber')) {
                event.target.value = event.target.value.replace(/\D/g, '');
            }
        });

        // Инициализация
        createAccountEditors();
        loadSavingsFields();
        loadValues();
    </script>
</body>
</html>
