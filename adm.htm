<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="joke-banner.js" defer></script>
    <title>Админ-панель - PWA Сбер</title>
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #21a038 0%, #00d920 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #21a038;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #21a038;
        }

        .balance-preview {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .preview-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .preview-value {
            font-size: 24px;
            font-weight: bold;
            color: #21a038;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: #21a038;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #1a8f2f;
            transform: translateY(-2px);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #21a038;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>⚙️ Админ-панель</h1>
        <p class="subtitle">Управление значениями на главной странице</p>

        <form id="adminForm">
            <div class="form-group">
                <label for="walletBalance">Баланс кошелька (₽)</label>
                <input type="text" id="walletBalance" inputmode="decimal" placeholder="Например: 1 964,77" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="walletPreview">1 964,77 ₽</div>
                </div>
            </div>

            <div class="form-group">
                <label for="sberbonusBalance">Бонусы СберСпасибо</label>
                <input type="text" id="sberbonusBalance" inputmode="numeric" placeholder="Например: 111" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="sberbonusPreview">111</div>
                </div>
            </div>

            <button type="submit" class="btn-save">💾 Сохранить изменения</button>
            <button type="button" class="btn-reset" id="btnReset">🔄 Сбросить к исходным</button>

            <div class="success-message" id="successMessage">
                ✅ Изменения успешно сохранены! Обновите главную страницу.
            </div>
        </form>

        <a href="Main.htm" class="nav-link">← Вернуться в приложение</a>
    </div>

    <script>
        // API endpoint для сервера
        const API_URL = '/api/balances';

        // Ключи для localStorage (резервное хранение)
        const WALLET_KEY = 'pwa_wallet_balance';
        const SBERBONUS_KEY = 'pwa_sberbonus_balance';

        // Исходные значения
        const DEFAULT_WALLET = '1 964,77';
        const DEFAULT_SBERBONUS = '111';

        // Элементы формы
        const walletInput = document.getElementById('walletBalance');
        const sberbonusInput = document.getElementById('sberbonusBalance');
        const walletPreview = document.getElementById('walletPreview');
        const sberbonusPreview = document.getElementById('sberbonusPreview');
        const adminForm = document.getElementById('adminForm');
        const successMessage = document.getElementById('successMessage');
        const btnReset = document.getElementById('btnReset');

        // Форматирование сумм с пробелами между разрядами
        function formatAmount(value, allowDecimals) {
            const normalized = String(value ?? '')
                .replace(/\s/g, '')
                .replace(/\./g, ',')
                .replace(allowDecimals ? /[^\d,]/g : /\D/g, '');
            const commaIndex = allowDecimals ? normalized.indexOf(',') : -1;
            const hasComma = commaIndex !== -1;
            let integerPart = hasComma ? normalized.slice(0, commaIndex) : normalized;
            const decimalPart = hasComma
                ? normalized.slice(commaIndex + 1).replace(/\D/g, '').slice(0, 2)
                : '';

            integerPart = integerPart.replace(/\D/g, '').replace(/^0+(?=\d)/, '');
            if (!integerPart && hasComma) integerPart = '0';

            const grouped = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return grouped + (hasComma ? ',' + decimalPart : '');
        }

        function formatInput(input, allowDecimals) {
            const caret = input.selectionStart ?? input.value.length;
            const valueBeforeCaret = input.value.slice(0, caret);
            const digitsBeforeCaret = valueBeforeCaret.replace(/\D/g, '').length;
            const caretIsAfterComma = allowDecimals && /[,.]/.test(valueBeforeCaret);
            const formatted = formatAmount(input.value, allowDecimals);

            input.value = formatted;

            let nextCaret = 0;
            let digitsSeen = 0;
            while (nextCaret < formatted.length && digitsSeen < digitsBeforeCaret) {
                if (/\d/.test(formatted[nextCaret])) digitsSeen += 1;
                nextCaret += 1;
            }
            if (caretIsAfterComma && formatted.includes(',')) {
                nextCaret = Math.max(nextCaret, formatted.indexOf(',') + 1);
            }
            input.setSelectionRange(nextCaret, nextCaret);
            return formatted;
        }

        // Загрузка текущих значений с сервера
        async function loadValues() {
            try {
                const response = await fetch(API_URL, { method: 'GET' });
                if (response.ok) {
                    const data = await response.json();
                    const wallet = formatAmount(data.wallet || DEFAULT_WALLET, true);
                    const sberbonus = formatAmount(data.sberbonus || DEFAULT_SBERBONUS, false);
                    walletInput.value = wallet;
                    sberbonusInput.value = sberbonus;
                    updatePreviews(wallet, sberbonus);
                    return;
                }
            } catch (e) {
                console.log('Ошибка загрузки с сервера, используем localStorage', e);
            }

            // Fallback на localStorage если сервер недоступен
            const wallet = formatAmount(localStorage.getItem(WALLET_KEY) || DEFAULT_WALLET, true);
            const sberbonus = formatAmount(localStorage.getItem(SBERBONUS_KEY) || DEFAULT_SBERBONUS, false);
            walletInput.value = wallet;
            sberbonusInput.value = sberbonus;
            updatePreviews(wallet, sberbonus);
        }

        // Обновление предпросмотра
        function updatePreviews(wallet, sberbonus) {
            walletPreview.textContent = wallet + ' ₽';
            sberbonusPreview.textContent = sberbonus;
        }

        // Сохранение значений на сервере
        async function saveValues(wallet, sberbonus) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet, sberbonus })
                });

                if (response.ok) {
                    // Сохраняем также в localStorage для резерва
                    localStorage.setItem(WALLET_KEY, wallet);
                    localStorage.setItem(SBERBONUS_KEY, sberbonus);
                    // Отправляем событие для обновления на других вкладках
                    window.dispatchEvent(new Event('storage'));
                    return true;
                }
            } catch (e) {
                console.log('Ошибка сохранения на сервере, используем localStorage', e);
            }

            // Fallback на localStorage если сервер недоступен
            localStorage.setItem(WALLET_KEY, wallet);
            localStorage.setItem(SBERBONUS_KEY, sberbonus);
            window.dispatchEvent(new Event('storage'));
            return true;
        }

        // Обработчик отправки формы
        adminForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const wallet = formatAmount(walletInput.value, true);
            const sberbonus = formatAmount(sberbonusInput.value, false);

            if (!wallet || !sberbonus) {
                alert('Пожалуйста, заполните все поля');
                return;
            }

            await saveValues(wallet, sberbonus);
            updatePreviews(wallet, sberbonus);

            // Показываем сообщение об успехе
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        });

        // Обработчик сброса
        btnReset.addEventListener('click', async function() {
            if (confirm('Вы уверены, что хотите сбросить значения к исходным?')) {
                await saveValues(DEFAULT_WALLET, DEFAULT_SBERBONUS);
                loadValues();
                successMessage.textContent = '🔄 Значения сброшены к исходным!';
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                    successMessage.textContent = '✅ Изменения успешно сохранены! Обновите главную страницу.';
                }, 3000);
            }
        });

        // Обновление предпросмотра в реальном времени
        walletInput.addEventListener('input', function() {
            const value = formatInput(this, true) || DEFAULT_WALLET;
            walletPreview.textContent = value + ' ₽';
        });

        sberbonusInput.addEventListener('input', function() {
            const value = formatInput(this, false) || DEFAULT_SBERBONUS;
            sberbonusPreview.textContent = value;
        });

        // Инициализация
        loadValues();
    </script>
</body>
</html>
