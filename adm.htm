<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - PWA Сбер</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #21a038 0%, #00d920 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #21a038;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #21a038;
        }

        .balance-preview {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .preview-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .preview-value {
            font-size: 24px;
            font-weight: bold;
            color: #21a038;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: #21a038;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #1a8f2f;
            transform: translateY(-2px);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #21a038;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>⚙️ Админ-панель</h1>
        <p class="subtitle">Управление значениями на главной странице</p>

        <form id="adminForm">
            <div class="form-group">
                <label for="walletBalance">Баланс кошелька (₽)</label>
                <input type="text" id="walletBalance" placeholder="Например: 1 964,77" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="walletPreview">1 964,77 ₽</div>
                </div>
            </div>

            <div class="form-group">
                <label for="sberbonusBalance">Бонусы СберСпасибо</label>
                <input type="text" id="sberbonusBalance" placeholder="Например: 111" required>
                <div class="balance-preview">
                    <div class="preview-label">Предпросмотр:</div>
                    <div class="preview-value" id="sberbonusPreview">111</div>
                </div>
            </div>

            <button type="submit" class="btn-save">💾 Сохранить изменения</button>
            <button type="button" class="btn-reset" id="btnReset">🔄 Сбросить к исходным</button>

            <div class="success-message" id="successMessage">
                ✅ Изменения успешно сохранены! Обновите главную страницу.
            </div>
        </form>

        <a href="/app/main" class="nav-link">← Вернуться на главную</a>
    </div>

    <script>
        // Ключи для localStorage
        const WALLET_KEY = 'pwa_wallet_balance';
        const SBERBONUS_KEY = 'pwa_sberbonus_balance';

        // Исходные значения
        const DEFAULT_WALLET = '1 964,77';
        const DEFAULT_SBERBONUS = '111';

        // Элементы формы
        const walletInput = document.getElementById('walletBalance');
        const sberbonusInput = document.getElementById('sberbonusBalance');
        const walletPreview = document.getElementById('walletPreview');
        const sberbonusPreview = document.getElementById('sberbonusPreview');
        const adminForm = document.getElementById('adminForm');
        const successMessage = document.getElementById('successMessage');
        const btnReset = document.getElementById('btnReset');

        // Загрузка текущих значений
        function loadValues() {
            const wallet = localStorage.getItem(WALLET_KEY) || DEFAULT_WALLET;
            const sberbonus = localStorage.getItem(SBERBONUS_KEY) || DEFAULT_SBERBONUS;

            walletInput.value = wallet;
            sberbonusInput.value = sberbonus;
            updatePreviews(wallet, sberbonus);
        }

        // Обновление предпросмотра
        function updatePreviews(wallet, sberbonus) {
            walletPreview.textContent = wallet + ' ₽';
            sberbonusPreview.textContent = sberbonus;
        }

        // Сохранение значений
        function saveValues(wallet, sberbonus) {
            localStorage.setItem(WALLET_KEY, wallet);
            localStorage.setItem(SBERBONUS_KEY, sberbonus);

            // Отправляем событие для обновления на других вкладках
            window.dispatchEvent(new Event('storage'));
        }

        // Обработчик отправки формы
        adminForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const wallet = walletInput.value.trim();
            const sberbonus = sberbonusInput.value.trim();

            if (!wallet || !sberbonus) {
                alert('Пожалуйста, заполните все поля');
                return;
            }

            saveValues(wallet, sberbonus);
            updatePreviews(wallet, sberbonus);

            // Показываем сообщение об успехе
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        });

        // Обработчик сброса
        btnReset.addEventListener('click', function() {
            if (confirm('Вы уверены, что хотите сбросить значения к исходным?')) {
                localStorage.removeItem(WALLET_KEY);
                localStorage.removeItem(SBERBONUS_KEY);
                loadValues();
                successMessage.textContent = '🔄 Значения сброшены к исходным!';
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                    successMessage.textContent = '✅ Изменения успешно сохранены! Обновите главную страницу.';
                }, 3000);
            }
        });

        // Обновление предпросмотра в реальном времени
        walletInput.addEventListener('input', function() {
            const value = this.value.trim() || DEFAULT_WALLET;
            walletPreview.textContent = value + ' ₽';
        });

        sberbonusInput.addEventListener('input', function() {
            const value = this.value.trim() || DEFAULT_SBERBONUS;
            sberbonusPreview.textContent = value;
        });

        // Инициализация
        loadValues();
    </script>
</body>
</html>
