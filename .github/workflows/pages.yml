name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          rsync -a ./ _site/ \
            --exclude .git \
            --exclude .github \
            --exclude _site \
            --exclude .DS_Store \
            --exclude .htaccess \
            --exclude api \
            --exclude IMG_3681.MP4 \
            --exclude README_HOSTING.md \
            --exclude netlify.toml
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" _site/sw.js
          printf '{"run":"%s","sha":"%s","deployedAt":"%s"}\n' \
            "${GITHUB_RUN_NUMBER}" \
            "${GITHUB_SHA}" \
            "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            > _site/release.json

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
